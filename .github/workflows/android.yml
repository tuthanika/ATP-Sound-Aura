name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Bước này tạo một script cấu hình Gradle tạm thời
    # Nó sẽ ép bản release sử dụng cấu hình ký của bản debug
    - name: Create Gradle Init Script
      run: |
        cat <<EOF > init.gradle
        allprojects {
            afterEvaluate { project ->
                if (project.hasProperty('android')) {
                    project.android.buildTypes.all { buildType ->
                        if (buildType.name == 'release') {
                            // Ép bản release dùng chung key với bản debug
                            buildType.signingConfig = project.android.signingConfigs.debug
                        }
                    }
                }
            }
        }
        EOF

    # Build bản Release kèm theo script cấu hình vừa tạo
    # Lệnh này giúp kích hoạt R8/ProGuard để giảm 10 lần dung lượng
    - name: Build Optimized Release APK
      run: ./gradlew assembleRelease --init-script init.gradle

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SoundAura-Optimized-Signed
        path: app/build/outputs/apk/release/*.apk