name: Android CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Build Release APK (Fallback to Debug if no signing keys)
      run: |
        if [ -n "${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" ]; then
          ./gradlew assembleRelease
        else
          echo "No release secrets found, skipping assembleRelease. Using Debug APK instead."
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-apks
        path: app/build/outputs/apk/**/*.apk
